version: '3.8'
services:
  web:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - .:/code
    environment:
      - ENV=development
  
  frontend:
    build: .
    ports:
      - "5173:5173"
    volumes:
    - ./frontend:/code
    working_dir: /code
    command: npm run dev -- --host 0.0.0.0